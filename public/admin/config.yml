backend:
  name: github
  repo: frederic20021/empowerandlink
  branch: blog
  base_url: https://oauth.decapcms.com
  # ╔═══════════════════════════════════════════════╗
  # ║  SETUP INSTRUCTIONS                           ║
  # ║  1. Create a GitHub OAuth App:                ║
  # ║     https://github.com/settings/developers     ║
  # ║     - Homepage URL: your GitHub Pages URL      ║
  # ║     - Callback URL: your worker URL + /api/cb ║
  # ║  2. Deploy oauth-worker.js to Cloudflare       ║
  # ║  3. Update base_url above                      ║
  # ╚═══════════════════════════════════════════════╝

publish_mode: editorial_workflow
media_folder: "public/images/blog"
public_folder: "/images/blog"

collections:
  - name: "blog"
    label: "ブログ記事"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    editor:
      preview: false
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "スラッグ", name: "slug", widget: "string", hint: "URLに使われる識別子（例: hello-world）" }
      - { label: "公開日", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "抜粋", name: "excerpt", widget: "text", required: false }
      - { label: "カバー画像", name: "coverImage", widget: "image", required: false, default: "/images/blog/placeholder.svg" }
      - { label: "公開", name: "published", widget: "boolean", default: true, required: false }
      - { label: "本文", name: "body", widget: "markdown" }
